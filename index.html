<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Joy of Studies</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
        #sidebar { 
            width: 250px; background: #f4f4f4; border-right: 1px solid #ddd; 
            padding: 20px; overflow-y: auto; flex-shrink: 0;
        }
        #content { padding: 40px; overflow-y: auto; flex-grow: 1; line-height: 1.6; }
        pre { background: #272822; color: #fff; padding: 15px; border-radius: 5px; overflow-x: auto; }
        code { font-family: monospace; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="sidebar">Cargando menú...</div>
    <div id="content">Selecciona un ejercicio del menú para comenzar.</div>

    <script>
         
        fetch('sidebar.md') // <--- ASEGÚRATE DE QUE SE LLAME EXACTAMENTE ASÍ EN GITHUB
            .then(response => {
                if (!response.ok) {
                    throw new Error("No se pudo cargar sidebar.md. ¿El nombre es correcto?");
                }
                return response.text();
            })
            .then(text => {
                console.log("Archivo cargado con éxito"); // Verás esto en la consola F12
                document.getElementById('sidebar').innerHTML = marked.parse(text);
                
                // Configurar clics
                document.querySelectorAll('#sidebar a').forEach(link => {
                    link.onclick = (e) => {
                        e.preventDefault();
                        cargarContenido(link.getAttribute('href'));
                    };
                });
            })
            
    .catch(err => {
        document.getElementById('sidebar').innerHTML = "Error: " + err.message;
        console.error(err);
    });

        // 2. Función para cargar cualquier archivo .md en el centro
        function cargarContenido(archivo) {
            fetch(archivo)
                .then(response => {
                    if (!response.ok) throw new Error('Archivo no encontrado');
                    return response.text();
                })
                .then(text => {
                    document.getElementById('content').innerHTML = marked.parse(text);
                })
                .catch(err => {
                    document.getElementById('content').innerHTML = " Error: " + err.message;
                });
        }
    </script>
</body>
</html>
